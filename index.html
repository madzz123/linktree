<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madzz - Creative Developer & Preset Maker</title>
  <meta name="description" content="Madzz - Creative developer and preset maker. Find all my links, socials, and projects in one place.">
  <meta name="theme-color" content="#0a1628">
  <meta property="og:title" content="Madzz - Creative Developer & Preset Maker">
  <meta property="og:description" content="Find all my links, socials, and projects in one place.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <canvas id="particleCanvas" class="bg-canvas" aria-hidden="true"></canvas>
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <main class="container" id="appContainer">
    <!-- Loading skeleton (shown while JSON loads) -->
    <div id="loadingSkeleton">
      <div class="profile" style="align-items: center;">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton skeleton-text" style="width: 140px;"></div>
        <div class="skeleton skeleton-text short" style="width: 220px; height: 16px;"></div>
      </div>
      <div style="width: 100%; max-width: 460px;">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>

    <!-- Actual content (hidden until loaded) -->
    <div id="appContent" style="display: none; width: 100%; flex-direction: column; align-items: center;"></div>
  </main>

  <footer class="footer" id="appFooter" style="display: none;">
    &copy; 2026 Madzz. Built with &#9749;
  </footer>

  <script src="app.js"></script>
</body>
</html>
